---
ai_context_version: 1.1

project:
  name: plexer
  summary: "Event gateway and delivery relay for Heimgewebe operational events."
  role: event_gateway_delivery_relay
  primary_language: typescript
  visibility: internal

heimgewebe:
  axis:
    - Events
    - Motorik
  fleet:
    enabled: true
  wgx:
    profile_expected: true
    guard_smoke_expected: true

role_contract:
  name: event_gateway_delivery_relay
  authority: delivery_routing
  owns:
    - event_envelopes
    - delivery_attempts
    - relay_reports
  consumes:
    - bounded_operational_events
  produces:
    - chronik_delivery_attempts
    - observer_fanout_signals
  limits:
    - no_ledger_ownership
    - no_worker_control
  unavailable_effect: relay_degrades_without_changing_task_truth

interfaces:
  consumes:
    - "POST /events legacy envelope (type, source, payload)"
    - "planned POST /v1/events operational events"
  produces:
    - "Critical delivery to Chronik agent.ledger"
    - "Observer fanout to Heimgeist, Leitstand and hausKI"

contracts:
  schemas:
    - "metarepo/contracts/plexer/*.schema.json"
    - "metarepo/contracts/events/*.schema.json"

dependencies:
  internal:
    - name: chronik
      relationship: critical_sink
      interface: ["POST /v1/ingest?domain=agent.ledger"]
    - name: heimgeist
      relationship: observer_or_analyzer
      interface: [events]
    - name: leitstand
      relationship: observer
      interface: [events]
    - name: hausKI
      relationship: observer_or_consumer
      interface: [events]
  external:
    - name: node
      version: ">=20"

architecture:
  entrypoints:
    - "src/index.ts"
    - "src/server.ts"
  key_paths:
    - path: "src/__tests__/"
      purpose: "Tests"
    - path: "docs/architecture/plexer-v2-gateway.md"
      purpose: "Plexer v2 doctrine"
    - path: "docs/migration/plexer-v2-execution-plan.md"
      purpose: "In-place rebuild sequence"
  data_flow:
    input: "Legacy POST /events now; planned bounded POST /v1/events"
    processing: "Validation, Normalization, Allow-listing, Delivery Classification"
    output: "Critical Chronik delivery plus optional observer fanout"

boundaries:
  not_responsible_for:
    - "PR command handling"
    - "GitHub API interactions"
    - "Bot or reviewer behavior"
    - "Chat or dialog flow control"
    - "Bureau task claims"
    - "Grabowski worker execution"
    - "Chronik ledger ownership"
  dangerous_assumptions:
    - "Assuming observer fanout is audit-safe"
    - "Treating Plexer as the source of truth instead of Chronik"
    - "Adding broad event families before agent.run.* proves useful"

conventions:
  branching: "main, feature/*, docs/*"
  commit_prefix: "PLEXER"
  ci_platform: github_actions

documentation:
  runbook: README.md
  architecture: docs/architecture/plexer-v2-gateway.md
  migration_plan: docs/migration/plexer-v2-execution-plan.md

ai_guidance:
  do:
    - "Keep Plexer as gateway and delivery relay, not an orchestrator."
    - "Prefer Chronik as the critical append-only sink for operational ledger events."
    - "Keep first-slice operational events small and allow-listed."
    - "Preserve legacy /events compatibility while introducing v2 paths."
  dont:
    - "Store long logs, full prompts, copied evidence bodies or broad nested payloads in Plexer events."
    - "Add PR, review, Bureau claim or bundle event families before agent.run.* has proven useful."
    - "Make Grabowski or Bureau execution depend on Plexer availability."
